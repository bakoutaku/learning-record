<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="utf-8">
        <title>08_テーブル「時間割表」｜HTML・CSSの基礎知識</title>
        <link rel="stylesheet" href="../css/style.css">

    <body>
        <header>
            <a href="../index.html">←インデックスへ戻る</a>

            <h1>HTML・CSSの基礎知識</h1>
        </header>
        <main>
            <h2>08_テーブル「時間割表」</h2>

            <!--学習内容↓ここから-->
            <table border="1"><!--表に1ピクセルの枠線を付ける指定です-->
                <tr><!--table row（行）：一行分のデータ-->
                    <th>時間割表</th><!--table heading（見出し）-->
                    <th>月</th>
                    <th>火</th>
                    <th>水</th>
                    <th>木</th>
                    <th>金</th>
                    <th>土</th>
                </tr>
                <tr>
                    <th>1限</th>
                    <td>IH15</td><!--table data（データ）-->
                    <td rowspan="2">JV15</td><!--row（行）span（範囲）→「２」つ分-->
                    <td>WF15</td>
                    <td rowspan="2">CS15</td>
                    <td>CT15</td>
                    <td rowspan="2">(SG11)</td>
                </tr>
                <tr>
                    <th>2限</th>
                    <td>SD15</td>
                    <!--<td>JV15</td>-->
                    <td>DB15</td>
                    <!--<td>CS15</td>-->
                    <td>JV15</td>
                    <!--<td>(SG11)</td>-->
                </tr>
                <tr>
                    <th>3限</th>
                    <td rowspan="3">-</td>
                    <td>ランチ</td>
                    <td>FX12</td>
                    <td rowspan="3">-</td>
                    <td>ランチ</td>
                    <td rowspan="3">-</td>
                </tr>
                <tr>
                    <th>4限</th>
                    <!--<td>-</td>-->
                    <td>CS15</td>
                    <td rowspan="2">-</td>
                    <!--<td>-</td>-->
                    <td rowspan="2">WF15</td>
                    <!--<td>-</td>-->
                </tr>
                <tr>
                    <th>5限</th>
                    <!--<td>-</td>-->
                    <td>SL12</td>
                    <!--<td>-</td>-->
                    <!--<td>-</td>-->
                    <!--<td>WF15</td>-->
                    <!--<td>-</td>-->
                </tr>
            </table>


        </main>
        <footer>
            <small>『WF15』フロントエンド制作</small>
        </footer>

    </body>
</html>
